<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی زیرەکی هەڵسەنگاندنی مەترسی قەرز | Credit Risk ML</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Noto Sans Arabic Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Preserving Required Typography */
        @font-face {
            font-family: 'Rabar';
            src: local('Rabar_038'); /* Replace with your specific Rabar font file if hosted */
            font-display: swap;
        }
        body {
            font-family: 'Rabar', 'Noto Sans Arabic', sans-serif;
            background-color: #050505;
            color: #e5e5e5;
            overflow-x: hidden;
        }

        /* Flawless Glassmorphism & SaaS Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* Custom Range Slider (Premium Look) */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.6);
            cursor: pointer;
            margin-top: -8px;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            transition: background 0.3s ease;
        }
        input[type=range]:focus::-webkit-slider-runnable-track {
            background: rgba(6, 182, 212, 0.3);
        }

        /* Chrome Autofill Override for Dark Mode */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: white;
            -webkit-box-shadow: 0 0 0px 1000px #0a0a0a inset;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* Bouncy Modal Animations */
        #result_modal {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.9) translateY(20px);
            /* Buttery smooth bouncy bezier */
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        #result_modal.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1) translateY(0);
        }
        
        #modal_overlay {
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }
        #modal_overlay.active {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body class="min-h-screen relative antialiased selection:bg-cyan-500/30 selection:text-cyan-50 flex flex-col justify-center">
    
    <!-- Ambient Deep Space Background Glows -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden flex justify-center">
        <!-- Top Cyan Glow -->
        <div class="absolute top-[-10%] left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-cyan-600/10 rounded-full blur-[120px]"></div>
        <!-- Bottom Purple/Navy Glow -->
        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] bg-indigo-600/10 rounded-full blur-[120px]"></div>
        <!-- Subtle Hex/Dot Grid Texture -->
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMykiLz48L3N2Zz4=')] [mask-image:linear-gradient(to_bottom,white,transparent)]"></div>
    </div>

    <main class="relative z-10 container mx-auto max-w-2xl px-4 py-12 sm:py-20">
        
        <!-- Header -->
        <header class="text-center mb-12">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/[0.03] border border-cyan-500/20 shadow-[0_0_15px_rgba(6,182,212,0.1)] mb-6">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                </span>
                <span class="text-xs font-semibold tracking-wider text-cyan-400 font-sans uppercase">API Connected</span>
            </div>
            <h1 class="text-3xl sm:text-4xl font-bold mb-4 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-cyan-100 to-gray-400">
                هەڵسەنگاندنی مەترسی قەرز
            </h1>
            <p class="text-gray-400 text-base sm:text-lg font-light">
                سیستەمی زیرەکی هەڵسەنگاندنی B2B بە بەکارهێنانی مۆدێلی فێربوونی ئامێر
            </p>
        </header>

        <!-- Main Form Glass Card -->
        <div class="glass-panel rounded-3xl p-6 sm:p-10 transition-all duration-500 hover:border-white/10 hover:shadow-2xl hover:shadow-cyan-900/10">
            <form id="prediction_form" class="space-y-6">
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <!-- Example Number Input -->
                    <div class="space-y-2 group">
                        <label for="avg_invoice" class="block text-sm font-medium text-gray-400 group-focus-within:text-cyan-400 transition-colors">
                            تێکڕای بڕی پسوڵە
                        </label>
                        <div class="relative">
                            <input type="number" id="avg_invoice" name="avg_invoice" required
                                class="w-full bg-white/[0.03] border border-white/[0.08] hover:border-white/[0.15] focus:bg-white/[0.05] rounded-xl px-4 py-3.5 text-white placeholder-gray-600 focus:outline-none focus:border-cyan-500/60 focus:ring-1 focus:ring-cyan-500/60 transition-all shadow-inner"
                                placeholder="نموونە: 1500">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-500 font-sans text-xs">
                                USD
                            </div>
                        </div>
                    </div>

                    <!-- Example Select Dropdown -->
                    <div class="space-y-2 group">
                        <label for="business_type" class="block text-sm font-medium text-gray-400 group-focus-within:text-cyan-400 transition-colors">
                            جۆری بازرگانی
                        </label>
                        <div class="relative">
                            <select id="business_type" name="business_type" required
                                class="appearance-none w-full bg-white/[0.03] border border-white/[0.08] hover:border-white/[0.15] focus:bg-white/[0.05] rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-cyan-500/60 focus:ring-1 focus:ring-cyan-500/60 transition-all shadow-inner">
                                <option value="" disabled selected class="bg-[#0a0a0a]">هەڵبژێرە...</option>
                                <option value="retail" class="bg-[#0a0a0a]">تاکفرۆش (Retail)</option>
                                <option value="wholesale" class="bg-[#0a0a0a]">کۆمەڵفرۆش (Wholesale)</option>
                            </select>
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                                <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Example Range Slider -->
                <div class="space-y-3 pt-2">
                    <div class="flex justify-between items-center">
                        <label for="payment_history" class="block text-sm font-medium text-gray-400">
                            پابەندبوون بە کاتی پارەدان
                        </label>
                        <span id="payment_history_val" class="text-cyan-400 font-bold font-sans text-sm bg-cyan-500/10 px-2 py-1 rounded-md">85%</span>
                    </div>
                    <input type="range" id="payment_history" name="payment_history" min="0" max="100" value="85"
                        oninput="document.getElementById('payment_history_val').innerText = this.value + '%'">
                </div>

                <!-- Premium Submit Button -->
                <div class="pt-6">
                    <button type="submit" id="submit_btn" 
                        class="relative w-full overflow-hidden bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-medium py-4 rounded-xl shadow-[0_0_20px_rgba(8,145,178,0.3)] hover:shadow-[0_0_30px_rgba(8,145,178,0.5)] transition-all duration-300 flex justify-center items-center gap-3 group">
                        <span class="relative z-10 text-lg">شیکردنەوەی داتا</span>
                        <svg class="w-5 h-5 relative z-10 group-hover:-translate-x-1.5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Modal Overlay -->
    <div id="modal_overlay" class="fixed inset-0 bg-black/70 backdrop-blur-md z-40"></div>
    
    <!-- Result Modal (Centered) -->
    <div class="fixed inset-0 z-50 flex items-center justify-center p-4 pointer-events-none">
        <div id="result_modal" class="glass-panel w-full max-w-md rounded-3xl p-8 pointer-events-auto shadow-2xl border-t-2 border-t-cyan-500 shadow-[0_0_40px_rgba(6,182,212,0.15)] relative overflow-hidden">
            
            <!-- Inner Modal Glow -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[200px] h-[100px] bg-cyan-500/20 blur-[50px] pointer-events-none"></div>

            <div class="relative z-10 text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-cyan-500/10 border border-cyan-500/20 mb-4">
                    <svg class="h-6 w-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-xl font-bold text-white mb-6">ئەنجامی مۆدێلی ژیری دەستکرد</h2>
                
                <div class="space-y-4 mb-8">
                    <!-- Data Rows -->
                    <div class="flex justify-between items-center bg-white/[0.02] rounded-xl p-4 border border-white/[0.05]">
                        <span class="text-gray-400 text-sm">ئاستی مەترسی:</span>
                        <span id="risk_level_result" class="font-bold text-emerald-400">نزم (Low)</span>
                    </div>
                    
                    <div class="flex justify-between items-center bg-white/[0.02] rounded-xl p-4 border border-white/[0.05]">
                        <span class="text-gray-400 text-sm">لیمێتی پێشنیارکراو:</span>
                        <span id="credit_limit_result" class="font-bold text-cyan-400 text-2xl font-sans">$12,500</span>
                    </div>
                </div>

                <button type="button" onclick="closeModal()" 
                    class="w-full bg-white/[0.05] hover:bg-white/[0.1] border border-white/[0.1] text-white font-medium py-3.5 rounded-xl transition-all duration-200">
                    داخستن
                </button>
            </div>
        </div>
    </div>

    <!-- YOUR ORIGINAL JAVASCRIPT GOES HERE -->
    <script>
        // DOM Elements
        const form = document.getElementById('prediction_form');
        const submitBtn = document.getElementById('submit_btn');
        const modal = document.getElementById('result_modal');
        const overlay = document.getElementById('modal_overlay');

        // UI Helpers
        function openModal() {
            modal.classList.add('active');
            overlay.classList.add('active');
        }
        function closeModal() {
            modal.classList.remove('active');
            overlay.classList.remove('active');
        }

        // --- REPLACE THIS WITH YOUR EXACT FETCH LOGIC ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="animate-pulse">لە پرۆسەدایە...</span>';
            submitBtn.disabled = true;

            try {
                // Dummy delay mimicking your FastAPI request:
                // fetch('https://umedjamala-credit-risk-scoring-ml.hf.space/predict', {...})
                await new Promise(r => setTimeout(r, 1500)); 
                openModal();
            } catch (error) {
                console.error('Error:', error);
                alert('هەڵەیەک ڕوویدا لە پەیوەندیکردن بە سێرڤەرەوە.');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
